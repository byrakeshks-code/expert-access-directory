# version is obsolete in Compose V2 and is ignored

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '127.0.0.1:3000:3000'
    env_file:
      - ./backend/.env
    depends_on:
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    ports:
      # Use 6380 on host to avoid conflict with local Redis or other projects on 6379
      - '127.0.0.1:6380:6379'
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_secret}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_dev_secret}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    ports:
      - '127.0.0.1:7700:7700'
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_API_KEY:-masterKey}
      - MEILI_ENV=development
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 3s
      retries: 5

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - '127.0.0.1:3001:3000'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  meilisearch_data:
